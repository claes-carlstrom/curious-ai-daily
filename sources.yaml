# Curious AI Daily — News Sources Configuration
#
# Edit this file to change where the daily routine looks for news.
# Priority 1 sources are always checked. Priority 2 fill gaps.

# ── What we're looking for ──────────────────────────────────────
# 1. New features/products from major AI companies
# 2. New model releases and benchmarks
# 3. Breaking and viral AI news
# 4. AI tools for CMS, CRM and other content operations
# 5. AI content creation tools (video, image, voice, writing)
# 6. AI for marketing and growth
# 7. Community buzz and standout demos


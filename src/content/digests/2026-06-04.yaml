  - title: "New York Mandates Disclosure of AI-Generated Content in Advertising"
    summary: "New York has become the first U.S. state to require advertisers to disclose AI-generated people, images, or voices in their content. This regulation aims to increase transparency and inform consumers about the use of AI in advertising materials."

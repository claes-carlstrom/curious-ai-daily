  - title: "Google Introduces Nano Banana 2 Lite and Gemini Omni Flash for Enhanced AI Media Creation"
    summary: "Google has unveiled Nano Banana 2 Lite, its fastest and most cost-efficient AI image generation model, alongside Gemini Omni Flash, a new video generation and editing model. These additions aim to accelerate AI-powered image and video creation, offering improved performance and affordability for developers and enterprises."

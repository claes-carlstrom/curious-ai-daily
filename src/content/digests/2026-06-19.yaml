  - title: "Nauk Nauk Raises $20 Million to Animate Toy Photos into Videos"
    summary: "Startup Nauk Nauk has secured $20 million in funding to expand its AI video application that transforms toy photos into short animated videos. Targeting the 'kidult' market, the app allows users to create 15- to 20-second videos with music or voiceovers from a single image and prompt."

  - title: "Shield AI Secures U.S. Air Force Contract for Autonomous Combat Aircraft Software"
    summary: "Shield AI has been awarded a production contract by the U.S. Air Force to implement its Hivemind mission autonomy software for the Collaborative Combat Aircraft program. This contract reflects the Air Force's software-first approach to autonomy, aiming to rapidly iterate mission autonomy software upgrades independent of the aircraft."

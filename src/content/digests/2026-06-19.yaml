  - title: "xAI Releases Grok Imagine Video 1.5 with Enhanced Audio-Visual Synchronization"
    summary: "xAI has launched Grok Imagine Video 1.5, introducing synchronized audio and video generation, including sound effects and character dialogue. The update also improves lip-sync accuracy and motion consistency, with a 'Fast' version reducing 6-second 720p video generation to 25 seconds. The web interface now supports project management, parallel processing, and semantic media search."

  - title: "Lightricks Releases LTX-2: Open-Source AI Video Foundation Model"
    summary: "Lightricks has introduced LTX-2, an open-source AI video foundation model capable of generating synchronized audio and video at native 4K resolution and 50 fps. Designed for efficiency, LTX-2 operates on consumer-grade GPUs and integrates seamlessly into production workflows."
    url: "https://www.prnewswire.com/news-releases/lightricks-releases-ltx-2-the-first-complete-open-source-ai-video-foundation-model-302593012.html"

  - title: "Adobe Launches Firefly Video Model for AI-Powered Video Generation"
    summary: "Adobe has released the Firefly Video Model, an AI tool designed to generate 5-second, 1080p video clips. Integrated with Premiere Pro, it aims to assist film and television studios by enhancing or correcting existing footage. Pricing starts at $9.99 for 20 clips per month."

  - title: "Anthropic Suspends Access to Fable 5 and Mythos 5 AI Models Following U.S. Government Directive"
    summary: "Anthropic has disabled its advanced AI models, Fable 5 and Mythos 5, for all users after receiving a U.S. government order citing national security concerns. The directive restricts access to these models for foreign nationals, leading Anthropic to suspend them entirely."

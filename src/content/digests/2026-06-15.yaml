  - title: "OpenAI Discontinues Sora After High Operational Costs and Low Revenue"
    summary: "OpenAI has ceased operations of its AI video tool, Sora, due to unsustainable costs of $15 million per day and total lifetime revenue of only $2.1 million. This decision reflects the challenges in monetizing advanced AI video generation technologies."

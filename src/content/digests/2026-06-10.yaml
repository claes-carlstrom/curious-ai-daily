  - title: "Shutterstock Launches AI Video Generator Integrating Multiple Models"
    summary: "Shutterstock has introduced an AI Video Generator that combines text-to-video and image-to-video models from providers like Google and Runway. The platform allows users to create videos from text prompts, animate static images, or build on existing assets from Shutterstock’s library. Customers receive two free generations to test the technology."
    url: "https://www.investing.com/news/company-news/shutterstock-launches-ai-video-generator-with-multiple-models-93CH-4615556"
    source: "investing.com"

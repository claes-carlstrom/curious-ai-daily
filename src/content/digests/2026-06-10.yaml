  - title: "Apple Unveils Major AI Enhancements Across Devices at WWDC 2026"
    summary: "At WWDC 2026, Apple introduced significant AI-powered features across iPhone, iPad, and Mac. Updates include smarter cross-app suggestions, natural language event creation, and enhanced photo editing tools. Siri AI, a redesigned voice assistant with advanced capabilities, will launch in public beta in July and fully roll out in September with iOS 27 and iPhone 18."

  - title: "Runway Introduces Aleph: AI Model Focused on Video Editing"
    summary: "Runway has launched Aleph, an AI model designed specifically for in-context video editing rather than generation. Aleph allows users to add or remove objects, relight scenes, change the time of day, and generate new camera angles without regenerating the original footage, offering a new paradigm in AI-assisted video production."
    url: "https://www.cliprise.app/news/runway-aleph-launch"

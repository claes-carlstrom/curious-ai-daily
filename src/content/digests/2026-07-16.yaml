  - title: "NVIDIA Proposes AI Agents for Efficient OpenUSD Runtime Generation"
    summary: "NVIDIA has introduced nanousd-labs, suggesting that AI agents can generate lightweight OpenUSD runtimes from the USD Core Specification. This approach aims to expedite tailored physical AI deployments."
    url: "https://creati.ai/ai-news/2026-07-16/"
    source: "creati.ai"

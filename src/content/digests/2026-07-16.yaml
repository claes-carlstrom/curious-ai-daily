  - title: "Meta Introduces Muse Image, Its First Image-Generation Model"
    summary: "On July 7, 2026, Meta launched Muse Image, the first image-generation model from Meta Superintelligence Labs. Muse Image utilizes agentic tool use, multi-reference composition, and Instagram social context, and is rolling out in Meta AI, Instagram Stories, and WhatsApp in select countries."
    url: "https://timesof.ai/2026/07/meta-muse-image-superintelligence-labs"
    source: "timesof.ai"
    tag: "models"
    significance: 4

  - title: "Google Launches Gemini Omni Video Model with Conversational Editing Capabilities"
    summary: "Google has introduced Gemini Omni, a multimodal model capable of generating and editing video from various inputs, including text, images, audio, and video. The first model in this family, Gemini Omni Flash, is now rolling out, offering conversational video generation and editing through the Gemini API, Google AI Studio, and Enterprise Agent Platform."
    url: "https://www.techtimes.com/articles/316859/20260519/google-launches-gemini-omni-video-model-holds-back-its-riskiest-feature.htm"

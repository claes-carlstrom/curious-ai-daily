  - title: "MiniMax Releases Hailuo 2.3 Video Model with Enhanced Motion and Style Support"
    summary: "Chinese AI startup MiniMax has launched Hailuo 2.3, an upgraded video generation model offering improved motion rendering, expanded style support for anime and CG, and more natural facial expressions. The accompanying Media Agent enables users to create videos from text, images, and audio with a single click."
    url: "https://www.seventnews.com/en/articles/minimax-launches-hailuo-23-video-model-with-enhanced-motion-and-style-support"
    source: "seventnews.com"
    tag: "content-creation"

  - title: "Anthropic Shuts Down Latest AI Model Amid U.S. Export Restrictions"
    summary: "Anthropic has disabled access to its newest AI models after the U.S. government imposed export restrictions, citing national security risks. The restrictions prevent foreign nationals from using the technology, including Anthropic's own employees who are not U.S. citizens."

    summary: "During the G7 summit, leaders deliberated on a plan to allow select 'trusted partners' access to advanced AI models from U.S. firms like Anthropic. This discussion follows the U.S. government's recent restrictions on foreign nationals using certain AI technologies due to national security concerns."

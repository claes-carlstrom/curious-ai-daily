  - title: "PixVerse Launches V6, Enhancing AI Video Generation"
    summary: "PixVerse has released V6, the latest version of its AI video generation platform. V6 improves camera control, character performance, and multi-shot video generation with native audio, benefiting both creative and commercial applications."
    url: "https://www.taiwannews.com.tw/en/news/6331069"

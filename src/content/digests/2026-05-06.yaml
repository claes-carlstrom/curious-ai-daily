  - title: "Microsoft, Google, and xAI to Provide US Government Early Access to AI Models"
    summary: "Microsoft, Google, and Elon Musk's xAI have agreed to grant the U.S. government early access to their AI models for national security testing. This collaboration aims to evaluate the models' capabilities and security risks before deployment."

  - title: "Pope Leo XIV Releases AI-Focused Encyclical 'Magnifica Humanitas'"
    summary: "Pope Leo XIV has released his first encyclical, 'Magnifica Humanitas,' addressing the protection of human dignity in the age of artificial intelligence. The document emphasizes ethical considerations in AI deployment, particularly in warfare, and was presented alongside Anthropic co-founder Christopher Olah, highlighting the Vatican's focus on AI ethics."

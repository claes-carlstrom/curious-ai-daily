  - title: "Luma Introduces Creative AI Agents Powered by Unified Intelligence Models"
    summary: "Luma has unveiled Luma Agents, designed to handle end-to-end creative work across text, image, video, and audio. Powered by the company's Unified Intelligence models, these agents aim to assist ad agencies, marketing teams, and design studios in streamlining their creative processes."

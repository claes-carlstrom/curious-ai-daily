  - title: "CraftStory Releases Image-to-Video AI for Long-Form Human Videos"
    summary: "CraftStory has launched Model 2.0, an AI that generates up to five-minute, studio-quality human videos from a single image and a script. This tool aims to streamline video production for businesses by creating expressive, long-form videos without the need for source footage."

  - title: "Google Releases Lyria 3 Pro for Extended AI-Generated Music Tracks"
    summary: "Google has launched Lyria 3 Pro, an advanced music generation model capable of creating tracks up to three minutes long with structural awareness. The model understands musical composition elements, allowing users to prompt for specific song structures and complex transitions, and is available on Vertex AI and Google AI Studio."

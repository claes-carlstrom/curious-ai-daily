  - title: "Google Launches Lyria 3 Pro for Extended AI-Generated Music Tracks"
    summary: "Google has released Lyria 3 Pro, an advanced music generation model capable of creating tracks up to three minutes long with structural awareness. The model understands musical composition elements, allowing users to prompt for specific song structures and complex transitions. Lyria 3 Pro is available on Vertex AI and integrated into Google Vids for Workspace customers."
    url: "https://www.investing.com/news/stock-market-news/google-launches-lyria-3-pro-for-longer-aigenerated-music-tracks-93CH-4580493"

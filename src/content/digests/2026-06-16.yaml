  - title: "Apple Unveils Siri AI and Apple Intelligence at WWDC 2026"
    summary: "At WWDC 2026, Apple introduced significant AI advancements, including a context-aware Siri capable of complex tasks and proactive actions. Integrated across all Apple platforms, Siri now supports third-party AI assistants via Siri Extensions. iOS 27 features AI-powered tools like Reframe for photo editing and smarter automation in Shortcuts and Safari."
    url: "https://www.tomsguide.com/news/live/wwdc-2026-live-news-updates"
    source: "tomsguide.com"

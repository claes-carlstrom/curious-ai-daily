  - title: "Anthropic Disables Top-Tier AI Models Following U.S. Government Directive"
    summary: "Anthropic has disabled its most advanced AI models, Fable 5 and Mythos 5, for all users after receiving a U.S. government order to suspend access for foreign nationals due to national security concerns. The directive cited potential methods to bypass safeguards preventing misuse of these models."

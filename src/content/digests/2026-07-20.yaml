  - title: "xAI Releases Grok Imagine 1.0, Advancing AI Video Generation"
    summary: "On February 2, 2026, xAI launched Grok Imagine 1.0, a video generation AI capable of producing 720p videos up to 10 seconds long, supporting both text-to-video and image-to-video generation with enhanced audio quality."
    url: "https://gigazine.net/gsc_news/en/20260203-grok-imagine-video-generation-ai"
    source: "gigazine.net"

  - title: "OpenAI's Sora 2 Enables User Integration into AI-Generated Videos with Sound"
    summary: "In October 2025, OpenAI introduced Sora 2, an AI model that generates videos with synchronized dialogue and sound effects, allowing users to insert themselves into AI-generated videos through 'cameos' using a new iOS social app."
    url: "https://arstechnica.com/ai/2025/10/openais-sora-2-lets-users-insert-themselves-into-ai-videos-with-sound/"

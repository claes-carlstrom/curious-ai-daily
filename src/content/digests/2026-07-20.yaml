  - title: "Meta Introduces Muse Image, Its First AI Image Generation Model"
    summary: "On July 7, 2026, Meta launched Muse Image, the inaugural image-generation model from Meta Superintelligence Labs. Muse Image utilizes agentic tool use, multi-reference composition, and Instagram social context, and is being rolled out in Meta AI, Instagram Stories, and WhatsApp in select countries."
    url: "https://timesof.ai/2026/07/meta-muse-image-superintelligence-labs"
    source: "timesof.ai"

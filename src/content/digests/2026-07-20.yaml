  - title: "Google Unveils Gemini Omni Flash Model for Video Generation with Synchronized Audio"
    summary: "In May 2026, Google introduced the Gemini Omni Flash model, capable of generating short video clips up to 10 seconds long with synchronized audio, physics-aware motion, and conversational editing, all within a unified tool."
    url: "https://www.technobezz.com/news/google-launches-gemini-omni-flash-model-that-generates-video-with-synchronized-audio"
    source: "technobezz.com"
    tag: "models"

  - title: "Topaz Labs Introduces Project Starlight for Video Enhancement"
    summary: "Topaz Labs announced Project Starlight, the first diffusion AI model for video enhancement. This tool transforms low-resolution or degraded video into HD quality, achieving full temporal consistency for seamless motion. Project Starlight upscales, enhances, denoises, de-aliases, and sharpens video without manual adjustments."
    url: "https://www.prnewswire.com/news-releases/topaz-labs-unveils-project-starlight-the-first-diffusion-ai-model-for-video-enhancement-302376630.html"

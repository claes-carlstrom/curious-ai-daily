  - title: "Manycore Tech Unveils LuxReal to Enhance Spatial Consistency in AI Video"
    summary: "At the 2025 Cool+ Conference, Manycore Tech launched LuxReal, a 3D AI content creation product designed to improve 'spatial consistency' in AI-generated videos. LuxReal enables rapid generation of videos with consistent subjects and controllable scenes from multimodal inputs, benefiting sectors like e-commerce and advertising."
    url: "https://finance.yahoo.com/news/manycore-tech-unveils-luxreal-3d-115300866.html"

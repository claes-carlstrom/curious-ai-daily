  - title: "AMD's Advancing AI 2026 Event Highlights Helios Architecture and MI450 GPUs"
    summary: "At the Advancing AI 2026 event, AMD is expected to provide updates on its Helios architecture and launch the MI450 GPUs, codenamed 'Altair.' Partnerships with HPE, Oracle, and AI startup Anthropic are anticipated to be key focuses, as AMD continues to expand its presence in AI infrastructure."

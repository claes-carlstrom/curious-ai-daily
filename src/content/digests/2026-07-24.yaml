  - title: "Adobe Firefly AI Video Editor Expands Free Features and Enhances Collaboration"
    summary: "Adobe's Firefly AI video editor now offers realistic, real-time outputs with an updated interface. Free users gain access to core AI features like Generative Fill and Background Removal, while paid plans start at $8.49/month. New features include Firefly Boards for collaborative brainstorming and support for over ten AI models."

    summary: "InVideo's latest AI video editor introduces Agent One, a conversational AI assistant that enables detailed, context-aware video creation through simple English instructions. Trusted by companies like Netflix and Google, it supports over 200 AI models and offers customizable templates and animation styles. Pricing ranges from a free plan to elite plans up to $9,000/month."

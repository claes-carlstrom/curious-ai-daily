  - title: "Google Launches Antigravity 2.0 at I/O 2026"
    summary: "At Google I/O 2026, Google introduced Antigravity 2.0, featuring an updated desktop app, CLI tool, and SDK for custom workflows. The new version allows users to orchestrate multiple agents, execute tasks simultaneously, and integrate projects with Google AI Studio, Android, and Firebase."
